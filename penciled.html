<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5B4BE0">
<title>Penciled — plans, lightly committed</title>
<style>
  :root{
    --ink:#1B1A2E; --ink-soft:#4a4862; --ink-faint:#8b89a3;
    --stone:#f3f2ee; --surface:#ffffff; --line:#e7e5df;
    --violet:#5B4BE0; --violet-d:#4536c9; --violet-wash:#efedfd;
    --gold:#F2B53B;
    --yes:#18A669; --yes-w:#e4f5ec;
    --maybe:#E8973A; --maybe-w:#fcf0e1;
    --no:#D85B62; --no-w:#fbe9ea;
    --margin:#e0838b;
    --r:14px; --rs:9px;
    --shadow:0 1px 2px rgba(27,26,46,.05), 0 6px 18px rgba(27,26,46,.06);
    --shadow-lg:0 10px 40px rgba(27,26,46,.18);
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--stone);
    font-size:16px; line-height:1.45; -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:16px;color:var(--ink)}
  a{color:var(--violet)}
  .wrap{max-width:680px;margin:0 auto;padding:0 16px 120px}

  /* ---------- header ---------- */
  .topbar{
    position:sticky;top:0;z-index:30;background:rgba(243,242,238,.86);
    backdrop-filter:saturate(160%) blur(10px);
    border-bottom:1px solid var(--line);
    padding:max(10px,env(safe-area-inset-top)) 16px 10px;
  }
  .topbar-in{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.02em;font-size:19px}
  .brand .pip{width:13px;height:13px;border-radius:50%;background:var(--violet);position:relative;flex:none}
  .brand .pip::after{content:"";position:absolute;left:3px;top:3px;width:7px;height:7px;border-radius:50%;background:var(--gold)}
  .brand small{font-weight:600;color:var(--ink-faint);font-size:11px;letter-spacing:.02em;display:block;margin-top:-3px}
  .spacer{flex:1}
  .iconbtn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--ink-soft);font-size:18px;border:1px solid transparent}
  .iconbtn:hover{background:var(--surface);border-color:var(--line)}
  .iconbtn.on{color:var(--violet)}
  body.guest #btnPlans{display:none}
  body.guest #btnCloud{display:none}

  /* ---------- eyebrow / labels ---------- */
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}

  /* ---------- plan head ---------- */
  .planhead{padding:22px 2px 6px}
  .planhead .titlewrap{display:flex;align-items:flex-start;gap:8px}
  .plantitle{font-size:30px;font-weight:800;letter-spacing:-.025em;line-height:1.1;border:none;background:none;width:100%;padding:0;resize:none;overflow:hidden}
  .plantitle::placeholder{color:var(--ink-faint)}
  .plannote{width:100%;border:none;background:none;resize:none;overflow:hidden;color:var(--ink-soft);font-size:15px;margin-top:4px;padding:0}
  .plannote::placeholder{color:var(--ink-faint)}

  .weeknav{display:flex;align-items:center;gap:6px;margin:14px 0 4px}
  .weeknav button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);font-size:16px;color:var(--ink-soft);display:grid;place-items:center}
  .weeknav button:active{transform:scale(.94)}
  .weeklabel{font-weight:700;font-size:14px;letter-spacing:.01em}
  .weeklabel span{color:var(--ink-faint);font-weight:600}

  /* ---------- day section / margin spine ---------- */
  .days{margin-top:10px}
  .day{position:relative;padding-left:26px;margin-bottom:6px}
  .day::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--margin);opacity:.5}
  .day:last-child::before{bottom:18px}
  .day-hd{display:flex;align-items:baseline;gap:9px;padding:14px 0 8px;position:relative}
  .day-hd::before{content:"";position:absolute;left:-21px;top:18px;width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--margin)}
  .day-name{font-weight:800;font-size:16px;letter-spacing:-.01em}
  .day-date{font-size:13px;color:var(--ink-faint);font-weight:600;font-variant-numeric:tabular-nums}
  .day-count{font-size:12px;color:var(--ink-faint);margin-left:auto;font-weight:600}
  .day.empty .day-hd{opacity:.55}

  /* ---------- activity card ---------- */
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
    box-shadow:var(--shadow);padding:13px 14px;margin-bottom:9px;position:relative;overflow:hidden;
    animation:rise .32s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.card{animation:none}}
  .card .stripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .card-row{display:flex;align-items:flex-start;gap:10px}
  .card-main{flex:1;min-width:0}
  .card-time{font-size:12.5px;font-weight:800;letter-spacing:.02em;color:var(--violet);font-variant-numeric:tabular-nums;margin-bottom:3px;display:flex;align-items:center;gap:5px}
  .card-time .clk{font-size:12px;opacity:.7}
  .card-name{font-weight:700;font-size:16.5px;letter-spacing:-.01em;line-height:1.25}
  .card-desc{font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.5;white-space:pre-wrap}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;letter-spacing:.02em;padding:3px 9px;border-radius:999px;margin-top:6px}
  .chip .dot{width:7px;height:7px;border-radius:50%}
  .where{display:flex;align-items:center;gap:5px;color:var(--ink-soft);font-size:13.5px;margin-top:7px}
  .links{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
  .linkpill{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--ink-soft);background:var(--stone);border:1px solid var(--line);padding:5px 10px;border-radius:9px;text-decoration:none}
  .linkpill:hover{border-color:var(--violet);color:var(--violet)}
  .stars{display:inline-flex;gap:2px;margin-top:8px}
  .stars .s{font-size:15px;color:#d9d6ce}
  .stars .s.f{color:var(--gold)}
  .rate-label{font-size:11px;color:var(--ink-faint);font-weight:600;margin-left:6px;letter-spacing:.04em;text-transform:uppercase;align-self:center}
  .card-acts{display:flex;flex-direction:column;gap:6px;flex:none}
  .miniact{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--ink-faint);font-size:15px;border:1px solid transparent}
  .miniact:hover{background:var(--stone);border-color:var(--line);color:var(--ink)}

  /* ---------- add buttons ---------- */
  .addrow{padding-left:26px}
  .addbtn{width:100%;text-align:left;border:1.5px dashed var(--line);border-radius:var(--rs);padding:11px 13px;color:var(--ink-faint);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;background:none;margin-top:2px}
  .addbtn:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-wash)}

  /* ---------- floating share bar ---------- */
  .actionbar{position:fixed;left:0;right:0;bottom:0;z-index:25;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(243,242,238,.9)28%,var(--stone) 60%)}
  .actionbar-in{max-width:680px;margin:0 auto;display:flex;gap:10px}
  .btn{flex:1;border-radius:13px;padding:14px 16px;font-weight:700;font-size:15.5px;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-.01em;transition:transform .08s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--violet);color:#fff;box-shadow:0 6px 18px rgba(91,75,224,.32)}
  .btn-primary:hover{background:var(--violet-d)}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);flex:none;width:54px}

  /* ---------- bottom sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(27,26,46,.42);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--surface);border-radius:22px 22px 0 0;box-shadow:var(--shadow-lg);transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.7,.3,1);max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
  .sheet.show{transform:none}
  .sheet-in{max-width:680px;margin:0 auto;padding:8px 18px 24px}
  .grab{width:38px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 6px}
  .sheet h2{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px}
  .field{margin-top:15px}
  .field > label{display:block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px}
  .field input[type=text], .field input[type=url], .field input[type=time], .field textarea{
    width:100%;border:1px solid var(--line);background:var(--stone);border-radius:11px;padding:12px 13px;outline:none;transition:border-color .15s,background .15s;
  }
  .field input:focus, .field textarea:focus{border-color:var(--violet);background:var(--surface)}
  .field .hint{font-size:12px;color:var(--ink-faint);margin-top:5px}

  .pills{display:flex;flex-wrap:wrap;gap:7px}
  .pill{border:1px solid var(--line);background:var(--stone);border-radius:999px;padding:8px 13px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft)}
  .pill .dot{width:8px;height:8px;border-radius:50%}
  .pill.sel{color:#fff;border-color:transparent}
  .daypills{display:flex;flex-wrap:wrap;gap:6px}
  .daypill{border:1px solid var(--line);background:var(--stone);border-radius:10px;padding:8px 0;font-size:13px;font-weight:700;flex:1;min-width:42px;text-align:center;color:var(--ink-soft)}
  .daypill.sel{background:var(--violet);color:#fff;border-color:transparent}
  .daypill.ideas{flex-basis:100%;flex:none;width:100%;padding:9px}

  .ratepick{display:flex;gap:6px;align-items:center}
  .ratepick .s{font-size:30px;color:#d9d6ce;line-height:1;padding:2px}
  .ratepick .s.f{color:var(--gold)}

  .sheet-btns{display:flex;gap:10px;margin-top:22px}
  .sheet-btns .btn-primary{flex:1}
  .sheet-btns .btn-del{flex:none;width:52px;border-radius:13px;background:var(--no-w);color:var(--no);font-size:18px;display:grid;place-items:center}

  /* ---------- share sheet ---------- */
  .shareopt{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:13px;margin-top:10px;background:var(--stone);width:100%;text-align:left}
  .shareopt:hover{border-color:var(--violet);background:var(--violet-wash)}
  .shareopt .ic{width:42px;height:42px;border-radius:11px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;font-size:20px;flex:none}
  .shareopt .t{font-weight:700;font-size:15px}
  .shareopt .d{font-size:12.5px;color:var(--ink-faint);margin-top:1px}
  .linkbox{display:flex;gap:8px;margin-top:12px}
  .linkbox input{flex:1;border:1px solid var(--line);background:var(--stone);border-radius:10px;padding:11px;font-size:13px;color:var(--ink-soft)}
  .copybtn{padding:0 16px;border-radius:10px;background:var(--violet);color:#fff;font-weight:700;font-size:14px}

  /* ---------- respond / results ---------- */
  .vote{display:flex;gap:7px;margin-top:11px}
  .vbtn{flex:1;border:1.5px solid var(--line);background:var(--surface);border-radius:11px;padding:10px 4px;font-weight:700;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ink-soft);transition:transform .08s}
  .vbtn:active{transform:scale(.95)}
  .vbtn .vi{font-size:17px}
  .vbtn.sel.yes{background:var(--yes-w);border-color:var(--yes);color:var(--yes)}
  .vbtn.sel.maybe{background:var(--maybe-w);border-color:var(--maybe);color:var(--maybe)}
  .vbtn.sel.no{background:var(--no-w);border-color:var(--no);color:var(--no)}
  .votenote{width:100%;border:1px solid var(--line);background:var(--stone);border-radius:10px;padding:9px 11px;margin-top:9px;outline:none;font-size:14px}
  .votenote:focus{border-color:var(--violet);background:var(--surface)}

  /* ---- week-long items + checkbox answers ---- */
  .secthead{display:flex;align-items:center;gap:8px;margin:18px 2px 6px}
  .secthead .eyebrow{flex:none}
  .secthead .rule{flex:1;height:1px;background:var(--line)}
  .wkcard{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--violet);border-radius:var(--r);box-shadow:var(--shadow);padding:13px 14px;margin-bottom:9px}
  .wkcard .wk-name{font-weight:700;font-size:16.5px;letter-spacing:-.01em}
  .wkcard .wk-desc{font-size:14px;color:var(--ink-soft);margin-top:4px;white-space:pre-wrap}
  .daychips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .daychip{font-size:12px;font-weight:700;background:var(--violet-wash);color:var(--violet);border-radius:8px;padding:4px 9px}
  .checkrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .checkopt{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--line);background:var(--surface);border-radius:11px;padding:9px 13px;font-size:14px;font-weight:600;color:var(--ink-soft);text-align:left;transition:transform .08s}
  .checkopt:active{transform:scale(.97)}
  .checkopt .box{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:13px;color:#fff;transition:all .12s}
  .checkopt.on{border-color:var(--violet);background:var(--violet-wash);color:var(--violet)}
  .checkopt.on .box{background:var(--violet);border-color:var(--violet)}
  .checklabel{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:11px}
  .optedit-row{display:flex;gap:8px;margin-top:8px;align-items:center}
  .optedit-row input{flex:1;border:1px solid var(--line);background:var(--stone);border-radius:10px;padding:10px 12px;outline:none}
  .optedit-row input:focus{border-color:var(--violet);background:var(--surface)}
  .optedit-row .rm{width:38px;height:38px;border-radius:10px;background:var(--no-w);color:var(--no);flex:none;display:grid;place-items:center;font-size:16px}
  .optadd{margin-top:9px;border:1.5px dashed var(--line);border-radius:10px;padding:10px;color:var(--violet);font-weight:700;width:100%}
  .optadd:hover{background:var(--violet-wash);border-color:var(--violet)}
  .wk-results-day{display:flex;gap:8px;align-items:baseline;margin-top:7px;font-size:13.5px}
  .wk-results-day .d{font-weight:800;min-width:42px;color:var(--ink)}
  .wk-results-day .ppl{color:var(--ink-soft)}
  .wk-results-day .cnt{font-weight:700;color:var(--violet)}

  .tally{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
  .tchip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:5px 11px;border-radius:999px}
  .tchip.yes{background:var(--yes-w);color:var(--yes)}
  .tchip.maybe{background:var(--maybe-w);color:var(--maybe)}
  .tchip.no{background:var(--no-w);color:var(--no)}
  .tchip.none{background:var(--stone);color:var(--ink-faint)}
  .respnote{font-size:13px;color:var(--ink-soft);margin-top:8px;padding:8px 11px;background:var(--stone);border-radius:9px;border-left:3px solid var(--line)}
  .respnote b{color:var(--ink)}

  .banner{background:var(--violet-wash);border:1px solid var(--violet);border-radius:14px;padding:14px 16px;margin:18px 2px 4px;display:flex;gap:12px;align-items:flex-start}
  .banner .bi{font-size:22px;flex:none}
  .banner .bt{font-weight:800;font-size:15px;letter-spacing:-.01em}
  .banner .bd{font-size:13.5px;color:var(--ink-soft);margin-top:2px}

  .whofield{margin:0 2px}
  .respondents{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .who-chip{font-size:12.5px;font-weight:700;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 11px;color:var(--ink-soft)}

  .empty{text-align:center;padding:50px 20px;color:var(--ink-faint)}
  .empty .big{font-size:34px;margin-bottom:8px}
  .empty .et{font-weight:700;color:var(--ink-soft);font-size:16px}
  .empty .ed{font-size:14px;margin-top:4px}

  /* ---------- toast ---------- */
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:80;opacity:0;pointer-events:none;transition:all .25s;box-shadow:var(--shadow-lg);max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .myplans{margin-top:8px}
  .planrow{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .planrow:last-child{border:none}
  .planrow .pn{font-weight:700;flex:1}
  .planrow .pm{font-size:12px;color:var(--ink-faint)}
  .planrow.cur .pn::after{content:"current";font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--violet);margin-left:8px;background:var(--violet-wash);padding:2px 7px;border-radius:6px;vertical-align:middle}
  .smallbtn{font-size:13px;font-weight:700;color:var(--violet);padding:6px 8px;border-radius:8px}
  .smallbtn.danger{color:var(--no)}
  .newplan{width:100%;border:1.5px dashed var(--line);border-radius:11px;padding:13px;color:var(--violet);font-weight:700;margin-top:12px}
  .newplan:hover{background:var(--violet-wash);border-color:var(--violet)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-in">
    <div class="brand">
      <span class="pip"></span>
      <span>Penciled<small>plans, lightly committed</small></span>
    </div>
    <span class="spacer"></span>
    <button class="iconbtn" id="btnCloud" title="Sync" aria-label="Sync across devices">☁</button>
    <button class="iconbtn" id="btnPlans" title="My plans" aria-label="My plans">☰</button>
    <button class="iconbtn" id="btnSound" title="Sound" aria-label="Toggle sound">♪</button>
  </div>
</div>

<div class="wrap" id="app"></div>

<div class="actionbar" id="actionbar"></div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="sheet-in" id="sheetIn"></div></div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============================== data ============================== */
const CATS = [
  {k:"food",      label:"Food",        emoji:"🍽️", color:"#E8973A"},
  {k:"drinks",    label:"Drinks",      emoji:"🍸", color:"#B0468A"},
  {k:"ent",       label:"Entertainment",emoji:"🎬", color:"#7B5BE0"},
  {k:"outdoors",  label:"Outdoors",    emoji:"🌲", color:"#2E9E5B"},
  {k:"culture",   label:"Culture",     emoji:"🎟️", color:"#2E78D8"},
  {k:"active",    label:"Active",      emoji:"💪", color:"#159C97"},
  {k:"shopping",  label:"Shopping",    emoji:"🛍️", color:"#D8597E"},
  {k:"event",     label:"Event",       emoji:"📅", color:"#5B4BE0"},
  {k:"home",      label:"At home",     emoji:"🏠", color:"#7A8C5B"},
  {k:"other",     label:"Other",       emoji:"✨", color:"#7d7b94"}
];
const catBy = k => CATS.find(c=>c.k===k) || CATS[CATS.length-1];
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAYS_SHORT = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

/* ===== PASTE YOUR WORKER URL HERE (no trailing slash). Leave "" to stay offline-only. ===== */
const API_BASE = "https://penciled-api.penciled.workers.dev";   // your Worker URL

const KEY = "penciled.v1";
let DB = load();
let SESSION = []; // accumulated responses in results mode

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ const d=JSON.parse(raw); if(!d.auth) d.auth={}; return d; }
  }catch(e){}
  return { plans:{}, currentId:null, prefs:{sound:true}, auth:{} };
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){} syncAfterSave(); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function mondayOf(d){
  const x = new Date(d); x.setHours(0,0,0,0);
  const day = (x.getDay()+6)%7; // 0=Mon
  x.setDate(x.getDate()-day);
  return x;
}
function isoDate(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseISO(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }

function newPlan(){
  const id = uid();
  DB.plans[id] = {
    id, title:"", note:"", weekStart: isoDate(mondayOf(new Date())),
    activities:[], created:Date.now(), updated:Date.now(), responses:[]
  };
  DB.currentId = id; save();
  return DB.plans[id];
}
function current(){
  if(!DB.currentId || !DB.plans[DB.currentId]){
    const ids = Object.keys(DB.plans);
    if(ids.length){ DB.currentId = ids[ids.length-1]; }
    else return newPlan();
  }
  const p = DB.plans[DB.currentId];
  if(!p.responses) p.responses = [];
  return p;
}

/* ---- per-week plans: one plan per calendar week, created lazily ---- */
function planForWeek(ws){
  let best=null;
  for(const id in DB.plans){ const p=DB.plans[id]; if(p && p.weekStart===ws){ if(!best || (p.updated||0)>(best.updated||0)) best=p; } }
  return best;
}
function initViewWeek(){
  if(DB.viewWeek) return;
  const cur = DB.currentId && DB.plans[DB.currentId];
  DB.viewWeek = cur ? cur.weekStart : isoDate(mondayOf(new Date()));
}
function newPlanForWeek(ws){
  const id=uid();
  DB.plans[id]={ id, title:"", note:"", weekStart:ws, weekItems:[], activities:[], created:Date.now(), updated:Date.now(), responses:[] };
  DB.currentId=id; save();
  return DB.plans[id];
}
function ensureWeekPlan(ws){ const p=planForWeek(ws)||newPlanForWeek(ws); DB.currentId=p.id; if(!p.responses)p.responses=[]; if(!p.weekItems)p.weekItems=[]; return p; }
function isEmptyPlan(p){ return p && !p.activities.length && !(p.weekItems&&p.weekItems.length) && !(p.title&&p.title.trim()) && !(p.note&&p.note.trim()) && !(p.responses&&p.responses.length); }
function pruneEmptyWeek(ws){
  const p=planForWeek(ws);
  if(p && isEmptyPlan(p)){ const id=p.id; deleteRemote(id); delete DB.plans[id]; if(DB.currentId===id) DB.currentId=null; saveLocal(); }
}
function nextEmptyWeek(){
  let d=mondayOf(new Date());
  for(let i=0;i<104;i++){ const ws=isoDate(d); if(!planForWeek(ws)) return ws; d.setDate(d.getDate()+7); }
  return isoDate(d);
}
function gotoWeek(ws){ const old=DB.viewWeek; if(old && old!==ws) pruneEmptyWeek(old); DB.viewWeek=ws; const p=planForWeek(ws); if(p) DB.currentId=p.id; saveLocal(); renderEdit(); }

/* ============================== encoding ============================== */
function b64urlFromBytes(bytes){
  let bin=""; for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function bytesFromB64url(s){
  s = s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4) s+="=";
  const bin = atob(s); const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
  return out;
}
function enc(obj){ return b64urlFromBytes(new TextEncoder().encode(JSON.stringify(obj))); }
function dec(str){ return JSON.parse(new TextDecoder().decode(bytesFromB64url(str))); }

// compact a plan into a small share payload
function packPlan(p){
  const o = { i:p.id, w:p.weekStart };
  if(p.title) o.t = p.title;
  if(p.note)  o.x = p.note;
  if(p.weekItems && p.weekItems.length) o.wi = p.weekItems.map(w=>{ const c={n:w.name, days:w.days||[]}; if(w.desc) c.b=w.desc; return c; });
  o.a = p.activities.map(a=>{
    const c = {n:a.name, c:a.cat, d:a.day};
    if(a.time) c.h = a.time;
    if(a.desc) c.b = a.desc;
    if(a.options && a.options.length) c.o = a.options;
    if(a.where) c.p = a.where;
    if(a.map)   c.m = a.map;
    if(a.web)   c.s = a.web;
    if(a.ig)    c.g = a.ig;
    if(a.rating) c.r = a.rating;
    return c;
  });
  return o;
}
function unpackPlan(o){
  return {
    id:o.i, title:o.t||"", note:o.x||"", weekStart:o.w,
    weekItems:(o.wi||[]).map(w=>({ id:uid(), name:w.n||"", desc:w.b||"", days:w.days||[] })),
    activities:(o.a||[]).map(c=>({
      id:uid(), name:c.n||"", cat:c.c||"other", day:(c.d==null?-1:c.d),
      time:c.h||"", desc:c.b||"", options:c.o||[],
      where:c.p||"", map:c.m||"", web:c.s||"", ig:c.g||"", rating:c.r||0
    }))
  };
}
function packResponse(planId, who, votes, weekChecks){
  // votes: per activity {c:'y'|'m'|'n', x:note, o:[optionIdx]} or null
  const v = [];
  votes.forEach((vt,i)=>{
    if(vt && (vt.c || (vt.o&&vt.o.length))){
      const e=[i, vt.c||"", vt.x||"", (vt.o&&vt.o.length)?vt.o:0];
      while(e.length>2){ const last=e[e.length-1]; if(last===""||last===0||(Array.isArray(last)&&!last.length)) e.pop(); else break; }
      v.push(e);
    }
  });
  const out = { p:planId, w:who||"", v };
  const wk=[];
  if(weekChecks) Object.keys(weekChecks).forEach(k=>{ const arr=weekChecks[k]; if(arr&&arr.length) wk.push([Number(k), arr.slice().sort((a,b)=>a-b)]); });
  if(wk.length) out.wk=wk;
  return out;
}

function readHash(){
  const h = location.hash.replace(/^#/,"");
  if(h.startsWith("p=")) return {mode:"respond", data:h.slice(2)};
  if(h.startsWith("v=")) return {mode:"cloudview", data:h.slice(2)};
  if(h.startsWith("r=")) return {mode:"results", data:h.slice(2)};
  return {mode:"edit"};
}

/* ============================== sound ============================== */
let AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function blip(freq=560, dur=0.07, type="sine", vol=0.16){
  if(!DB.prefs.sound) return; const a=ac(); if(!a) return;
  if(a.state==="suspended") a.resume();
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0,a.currentTime);
  g.gain.linearRampToValueAtTime(vol,a.currentTime+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}
function chord(){ if(!DB.prefs.sound) return; [523,659,784].forEach((f,i)=>setTimeout(()=>blip(f,0.16,"triangle",0.12),i*55)); }

/* ============================== dom helpers ============================== */
const $ = sel => document.querySelector(sel);
function h(tag, attrs={}, kids){
  const e=document.createElement(tag);
  for(const k in attrs){
    if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(attrs[k]!=null && attrs[k]!==false) e.setAttribute(k,attrs[k]);
  }
  if(kids!=null){ (Array.isArray(kids)?kids:[kids]).forEach(c=>{ if(c==null||c===false)return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); }); }
  return e;
}
function esc(s){ return (s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2100);
}
function autosize(el){ el.style.height="auto"; el.style.height=el.scrollHeight+"px"; }
function fmtDate(d){ return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function fmtTime(t){
  if(!t) return "";
  const parts=t.split(":"); let hh=parseInt(parts[0],10), mm=parts[1]||"00";
  if(isNaN(hh)) return "";
  const ap = hh<12?"AM":"PM"; let h12=hh%12; if(h12===0) h12=12;
  return h12+":"+String(mm).padStart(2,"0")+" "+ap;
}
function sortActs(acts){
  return acts.slice().sort((a,b)=>{
    if(a.time && b.time) return a.time.localeCompare(b.time);
    if(a.time) return -1;
    if(b.time) return 1;
    return 0;
  });
}
function ensureUrl(u){ if(!u) return ""; return /^https?:\/\//i.test(u)?u:"https://"+u; }

    optField.appendChild(h("div",{class:"hint"},"Your guest can check any of these (multi-select), shown above Yes / Maybe / No."));
    inEl.appendChild(optField);

    // buttons
    const btns=h("div",{class:"sheet-btns"});
    if(existing){
      btns.appendChild(h("button",{class:"btn-del",title:"Delete",onclick:()=>{

      }},"🗑"));
    }
    btns.appendChild(h("button",{class:"btn btn-primary",onclick:()=>{
      a.name = nameInput.value.trim(); a.where=whereInput.value.trim();

      a.map=mapInput.value.trim(); a.web=webInput.value.trim(); a.ig=igInput.value.trim();
      a.options = [...optList.querySelectorAll("input")].map(i=>i.value.trim()).filter(Boolean);

      const p2=current();
      if(existing){ const idx=p2.activities.findIndex(x=>x.id===existing.id); p2.activities[idx]=a; }
      else p2.activities.push(a);
      p2.updated=Date.now(); save(); closeSheet(); renderEdit(); chord();
    }}, existing?"Save changes":"Add to week"));
    inEl.appendChild(btns);

    setTimeout(()=>nameInput.focus(),250);
  });

/* ============================== SHARE ============================== */
function shareLink(p){ return location.origin + location.pathname + "#p=" + enc(packPlan(p)); }
function planAsText(p){
  const ws=parseISO(p.weekStart);
  let t = (p.title||"This week") + "\n";
  if(p.note) t += p.note + "\n";
  t += "Week of "+fmtDate(ws)+"\n";
  [-1,0,1,2,3,4,5,6].forEach(d=>{
    const acts=p.activities.filter(a=>a.day===d); if(!acts.length) return;
    t += "\n"+(d===-1?"Ideas":DAYS[d])+":\n";
    sortActs(acts).forEach(a=>{
      t += "  • "+(a.time?fmtTime(a.time)+" — ":"")+a.name+(a.where?" @ "+a.where:"")+(a.rating?" ("+"★".repeat(a.rating)+")":"")+"\n";
      if(a.desc) t += "    "+a.desc+"\n";
    });
  });
  return t.trim();
}

let RESP = { plan:null, votes:[], who:"", cloud:false };

function renderRespond(data){

function respondCard(a, gi){
  const card = activityCard(RESP.plan, a, false);

  // custom options (multi-select), shown above Yes/Maybe/No
  if(a.options && a.options.length){
    card.appendChild(h("div",{class:"checklabel"},"Pick any"));
    const orow=h("div",{class:"checkrow"});
    a.options.forEach((opt,oi)=>{
      const sel = ((RESP.votes[gi]&&RESP.votes[gi].o)||[]).includes(oi);
      orow.appendChild(checkOption(opt, sel, (on)=>{
        if(!RESP.votes[gi]) RESP.votes[gi]={c:""};
        if(!RESP.votes[gi].o) RESP.votes[gi].o=[];
        const arr=RESP.votes[gi].o, k=arr.indexOf(oi);
        if(on && k<0) arr.push(oi); else if(!on && k>=0) arr.splice(k,1);
      }));
    });
    card.appendChild(orow);
  }

  const vote=h("div",{class:"vote"});
  const opts=[["yes","Yes","👍"],["maybe","Maybe","🤔"],["no","No","👎"]];
  opts.forEach(([k,lbl,ic])=>{
    const cur = RESP.votes[gi] && RESP.votes[gi].c === k[0];
    const b=h("button",{class:"vbtn "+k+(cur?" sel":"")},[
      h("span",{class:"vi"},ic), lbl
    ]);
    b.addEventListener("click",()=>{
      const existing = RESP.votes[gi] || {};
      RESP.votes[gi] = {c:k[0], x:existing.x||"", o:existing.o||[]};
      vote.querySelectorAll(".vbtn").forEach(x=>x.classList.remove("sel"));
      b.classList.add("sel");
      blip(k[0]==="y"?660:k[0]==="m"?520:380,0.07,"sine",0.13);
    });
    vote.appendChild(b);
  });
  card.appendChild(vote);
  const note=h("input",{class:"votenote",type:"text",placeholder:"Add a note (optional)…",
    value:(RESP.votes[gi]&&RESP.votes[gi].x)||"",
    oninput:e=>{ if(!RESP.votes[gi]) RESP.votes[gi]={c:""}; RESP.votes[gi].x=e.target.value; }});
  card.appendChild(note);
  return card;
}

function sendAnswers(){
  const anyVote = RESP.votes.some(v=>v&&(v.c||(v.o&&v.o.length)));
  const anyWeek = RESP.weekChecks && Object.values(RESP.weekChecks).some(a=>a&&a.length);
  if(!anyVote && !anyWeek){ toast("Make at least one pick"); return; }
  if(RESP.cloud){ return sendAnswersCloud(); }
  const payload = packResponse(RESP.plan.id, RESP.who.trim(), RESP.votes, RESP.weekChecks);
  const link = location.origin + location.pathname + "#r=" + enc(payload);
  const text = responseAsText(RESP.plan, RESP.who.trim(), RESP.votes);

  openSheet(inEl=>{
    inEl.appendChild(h("h2",{},"Send these back"));
    inEl.appendChild(h("div",{class:"hint",style:"font-size:13.5px;color:var(--ink-soft);margin-top:4px"},
      "Send this to whoever sent you the plan. It's short — they'll see your picks matched to each idea."));

    if(navigator.share){
      inEl.appendChild(shareOpt("📤","Share my answers…","Phone's share menu", ()=>{
        navigator.share({title:"My answers", text:text+"\n", url:link}).catch(()=>{});
      }));
    }
    inEl.appendChild(shareOpt("💬","Text my answers","Opens Messages ready to send", ()=>{
      window.location.href="sms:?&body="+encodeURIComponent("My picks:\n"+link);
    }));
    inEl.appendChild(shareOpt("🔗","Copy answer link", "", ()=>copy(link,"Answer link copied")));
    inEl.appendChild(shareOpt("📝","Copy as plain text","Readable list of your picks", ()=>copy(text,"Copied")));

    const box=h("div",{class:"linkbox"});
    box.appendChild(h("input",{type:"text",readonly:true,value:link,onclick:e=>e.target.select()}));
    box.appendChild(h("button",{class:"copybtn",onclick:()=>copy(link,"Copied")},"Copy"));
    inEl.appendChild(box);
    if(location.protocol==="file:") inEl.appendChild(h("div",{class:"hint",style:"margin-top:10px"},
      "You're on a downloaded page, so this link won't open on its own — just copy it (or the plain text) and send it back. They'll paste it to see your picks."));
  });
}
async function sendAnswersCloud(){
  const payload = packResponse(RESP.plan.id, RESP.who.trim(), RESP.votes, RESP.weekChecks);
  toast("Sending…");
  try{ await api("/plan/"+RESP.plan.id+"/responses",{method:"POST",body:payload,auth:false}); }
  catch(e){ toast("Couldn't send — check your connection"); return; }
  chord();
  openSheet(inEl=>{
    inEl.appendChild(h("h2",{},"Sent ✓"));
    inEl.appendChild(h("div",{class:"hint",style:"font-size:14.5px;color:var(--ink-soft);margin-top:6px"},

      h("button",{class:"btn btn-primary",onclick:closeSheet},"Done")
    ]));

}
function responseAsText(plan, who, votes){
  let t = (who||"Someone")+"'s picks — "+(plan.title||"this week")+":\n";
  const mark={y:"✅ Yes",m:"🤔 Maybe",n:"❌ No"};
  plan.activities.forEach((a,i)=>{
    const v=votes[i]; if(!v||!v.c) return;
    t += "• "+(a.time?fmtTime(a.time)+" ":"")+a.name+": "+mark[v.c]+(v.x?" — "+v.x:"")+"\n";
  });
  return t.trim();
}

/* ============================== RESULTS MODE ============================== */
function renderResults(data){
  let payload;
  try{ payload = dec(data); }catch(e){ return renderBroken(); }
  const plan = DB.plans[payload.p];
  // persist this response into the plan if we own it
  if(plan){
    plan.responses = plan.responses || [];
    const sig = JSON.stringify(payload.v)+"|"+(payload.w||"");
    if(!plan.responses.some(r=> JSON.stringify(r.v)+"|"+(r.w||"")===sig)){
      plan.responses.push(payload); save();
    }
  }
  // build the session set of responses
  SESSION = plan ? plan.responses.slice() : [payload];
  drawResults(plan, payload);
}

function openResponsesFor(p){

}

    h("div",{},[
      h("div",{class:"bt"}, SESSION.length===1? "Here's what they think" : `What ${SESSION.length} people think`),

  // index votes per activity
  const byIdx={}; // idx -> [{who,c,x,o}]
  SESSION.forEach(r=>{ (r.v||[]).forEach(e=>{ const [i,c,x,o]=e; (byIdx[i]=byIdx[i]||[]).push({who:r.w||"Anon",c:c||"",x:x||"",o:o||[]}); }); });

  // week-long item results
  if(plan.weekItems && plan.weekItems.length){
    const weekBy={}; // wi -> { day -> [who] }
    SESSION.forEach(r=>{ (r.wk||[]).forEach(e=>{ const [wi,daysArr]=e; (daysArr||[]).forEach(d=>{ const mm=weekBy[wi]||(weekBy[wi]={}); (mm[d]||(mm[d]=[])).push(r.w||"Anon"); }); }); });
    const wsec=h("div",{});
    wsec.appendChild(h("div",{class:"secthead",style:"margin-top:8px"},[ h("span",{class:"eyebrow"},"All week"), h("span",{class:"rule"}) ]));

      (w.days||[]).slice().sort((a,b)=>a-b).forEach(d=>{

          h("span",{class:"cnt"}, ppl.length?("✓ "+ppl.length):"—"),

        ]));
      });
      wsec.appendChild(card);
    });
    app.appendChild(wsec);
    app.appendChild(h("div",{class:"secthead"},[ h("span",{class:"eyebrow"},"By day"), h("span",{class:"rule"}) ]));

  const days=h("div",{class:"days",style:"margin-top:14px"});

    const acts=plan.activities.filter(a=>a.day===d); if(!acts.length) return;
    const dd=new Date(ws); if(d!==-1) dd.setDate(ws.getDate()+d);
    const block=h("div",{class:"day"});
    block.appendChild(h("div",{class:"day-hd"},[
      h("span",{class:"day-name"}, d===-1?"Ideas / anytime":DAYS[d]),
      d!==-1 && h("span",{class:"day-date"}, fmtDate(dd))
    ]));
    sortActs(acts).forEach(a=>{
      const gi=plan.activities.indexOf(a);
      const card=activityCard(plan,a,false);
      const votes=byIdx[gi]||[];
      const y=votes.filter(v=>v.c==="y").length, m=votes.filter(v=>v.c==="m").length, n=votes.filter(v=>v.c==="n").length;
      const tally=h("div",{class:"tally"});
      if(y) tally.appendChild(h("span",{class:"tchip yes"}, "👍 "+y+(SESSION.length>1?" yes":" Yes")));
      if(m) tally.appendChild(h("span",{class:"tchip maybe"}, "🤔 "+m+(SESSION.length>1?" maybe":" Maybe")));
      if(n) tally.appendChild(h("span",{class:"tchip no"}, "👎 "+n+(SESSION.length>1?" no":" No")));
      if(!votes.length) tally.appendChild(h("span",{class:"tchip none"},"— no answer"));
      card.appendChild(tally);
      if(a.options && a.options.length){
        const otal=h("div",{class:"tally"});
        a.options.forEach((opt,oi)=>{
          const cnt=votes.filter(v=>(v.o||[]).includes(oi)).length;
          if(cnt) otal.appendChild(h("span",{class:"tchip",style:"background:var(--violet-wash);color:var(--violet)"}, "✓ "+opt+" · "+cnt));
        });
        if(otal.children.length) card.appendChild(otal);
      }
      votes.filter(v=>v.x).forEach(v=> card.appendChild(h("div",{class:"respnote",html:`<b>${esc(v.who)}:</b> ${esc(v.x)}`})));
      block.appendChild(card);
    });
    days.appendChild(block);
  });
  app.appendChild(days);

  // action bar: add another response + back
  const bar=$("#actionbar"); bar.innerHTML="";
  bar.appendChild(h("div",{class:"actionbar-in"},[
    h("button",{class:"btn btn-ghost",style:"width:auto;flex:1",onclick:()=>pasteAnother(plan)},"＋ Add another reply"),
    h("button",{class:"btn btn-primary",onclick:()=>{ location.hash=""; }},"Back to editing")
  ]));
}

function pasteAnother(plan){
  openSheet(inEl=>{
    inEl.appendChild(h("h2",{},"Add another reply"));
    inEl.appendChild(h("div",{class:"hint",style:"font-size:13.5px;color:var(--ink-soft);margin-top:4px"},
      "Paste the answer link (or #r=… code) someone sent you."));
    const field=h("div",{class:"field"},[ h("label",{},"Answer link") ]);
    const inp=h("input",{type:"text",placeholder:"https://…#r=…"});
    field.appendChild(inp); inEl.appendChild(field);
    inEl.appendChild(h("div",{class:"sheet-btns"},[
      h("button",{class:"btn btn-primary",onclick:()=>{
        let v=inp.value.trim(); const idx=v.indexOf("#r="); if(idx>=0) v=v.slice(idx+3); else if(v.startsWith("r=")) v=v.slice(2);
        let payload; try{ payload=dec(v); }catch(e){ toast("That doesn't look like an answer link"); return; }
        if(payload.p!==plan.id){ toast("That reply is for a different plan"); return; }
        const sig=JSON.stringify(payload.v)+"|"+(payload.w||"");
        if(!plan.responses.some(r=> JSON.stringify(r.v)+"|"+(r.w||"")===sig)){ plan.responses.push(payload); save(); }
        closeSheet(); openResponsesFor(plan); chord();
      }},"Add reply")
    ]));
    setTimeout(()=>inp.focus(),250);
  });
}

function rawResponseText(payload){
  const mark={y:"Yes",m:"Maybe",n:"No"};
  let t=(payload.w||"Someone")+" replied:\n";
  (payload.v||[]).forEach(e=>{ const [i,c,x]=e; t+="• Item "+(i+1)+": "+(mark[c]||c)+(x?" — "+x:"")+"\n"; });
  return t.trim();
}
function backToEditBtn(){
  return h("div",{style:"margin-top:20px"},[
    h("button",{class:"btn btn-primary",style:"width:100%",onclick:()=>{ location.hash=""; }},"Back to my plans")
  ]);
}

/* ============================== broken / fallback ============================== */
function renderBroken(){

  app.appendChild(h("div",{class:"empty"},[
    h("div",{class:"big"},"🤷"),
    h("div",{class:"et"},"That link didn't open"),

  ]));

/* ============================== my plans sheet ============================== */
function openPlansSheet(){
  openSheet(inEl=>{
    inEl.appendChild(h("h2",{},"My weeks"));
    if(API_BASE) inEl.appendChild(shareOpt("☁", apiReady()?"Synced — sync options":"Sync across devices", apiReady()?"Signed in · tap to manage":"Sign in with a code to sync", ()=>openSyncSheet()));
    inEl.appendChild(shareOpt("📨","Paste a reply you got","See someone's Yes / No / Maybe picks",()=>pasteReplyEntry()));
    const list=h("div",{class:"myplans"});
    const ids=Object.keys(DB.plans).sort((a,b)=> (DB.plans[a].weekStart||"").localeCompare(DB.plans[b].weekStart||""));
    if(!ids.length) list.appendChild(h("div",{class:"hint"},"No saved weeks yet."));
    ids.forEach(id=>{
      const p=DB.plans[id]; const cur=(p.weekStart===DB.viewWeek);
      const ws=parseISO(p.weekStart);
      const row=h("div",{class:"planrow"+(cur?" cur":"")});
      const meta=h("div",{style:"flex:1;min-width:0"},[
        h("div",{class:"pn"}, "Week of "+fmtDate(ws)+(p.title?" — "+p.title:"")),
        h("div",{class:"pm"}, p.activities.length+" idea"+(p.activities.length===1?"":"s")+(p.responses&&p.responses.length?" · "+p.responses.length+" replies":""))
      ]);
      row.appendChild(meta);
      if(!cur) row.appendChild(h("button",{class:"smallbtn",onclick:()=>{ closeSheet(); location.hash=""; gotoWeek(p.weekStart); }},"Open"));
      row.appendChild(h("button",{class:"smallbtn danger",onclick:()=>{
        deleteRemote(id); delete DB.plans[id]; if(DB.currentId===id) DB.currentId=null; saveLocal(); openPlansSheet(); renderEdit();
      }},"Delete"));
      list.appendChild(row);
    });
    inEl.appendChild(list);
    inEl.appendChild(h("button",{class:"newplan",onclick:()=>{ closeSheet(); location.hash=""; gotoWeek(nextEmptyWeek()); blip(680,0.08,"triangle",0.12); }},"＋  Go to a new week"));
  });
}

/* ============================== clipboard ============================== */
function copy(text, msg){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast(msg||"Copied")).catch(()=>fallbackCopy(text,msg));
  } else fallbackCopy(text,msg);
}
function fallbackCopy(text,msg){
  const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); toast(msg||"Copied"); }catch(e){ toast("Press and hold to copy"); }
  document.body.removeChild(ta);
}

/* ============================== export as web page ============================== */
function slugify(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,40); }
function exportStandalone(p){
  if(!p.activities.length){ toast("Add at least one idea first"); return; }
  const payload = enc(packPlan(p));
  const docEl = document.documentElement.cloneNode(true);
  // clear transient/rendered containers so the file opens clean
  ["#app","#actionbar","#sheetIn"].forEach(sel=>{ const e=docEl.querySelector(sel); if(e) e.innerHTML=""; });
  const tt=docEl.querySelector("#toast"); if(tt){ tt.textContent=""; tt.className="toast"; }
  const sc=docEl.querySelector("#scrim"); if(sc) sc.className="scrim";
  const sh=docEl.querySelector("#sheet"); if(sh) sh.className="sheet";
  // bake the plan in, before the main script runs
  const embed=document.createElement("script");
  embed.textContent="window.__PENCILED_EMBED__="+JSON.stringify(payload)+";";
  const head=docEl.querySelector("head"); head.insertBefore(embed, head.firstChild);
  const titleEl=docEl.querySelector("title"); if(titleEl) titleEl.textContent=(p.title||"Plans this week")+" — Penciled";

  const htmlStr="<!DOCTYPE html>\n"+docEl.outerHTML;
  const blob=new Blob([htmlStr],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=(slugify(p.title)||"plans")+".html";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  toast("Saved — send the file to anyone");
  closeSheet();
}

/* ============================== paste a reply (creator side) ============================== */
function pasteReplyEntry(){
  openSheet(inEl=>{
    inEl.appendChild(h("h2",{},"Paste a reply"));
    inEl.appendChild(h("div",{class:"hint",style:"font-size:13.5px;color:var(--ink-soft);margin-top:4px"},
      "Got an answer link or code back from someone? Paste it to see their picks lined up against your plan."));
    const field=h("div",{class:"field"},[ h("label",{},"Answer link or code") ]);
    const inp=h("input",{type:"text",placeholder:"https://…#r=…   or   r=…"});
    field.appendChild(inp); inEl.appendChild(field);
    inEl.appendChild(h("div",{class:"sheet-btns"},[
      h("button",{class:"btn btn-primary",onclick:()=>ingestReply(inp.value)},"Show their picks")
    ]));
    setTimeout(()=>inp.focus(),250);
  });
}
function ingestReply(v){
  v=(v||"").trim(); if(!v){ toast("Paste a reply first"); return false; }
  const idx=v.indexOf("#r="); if(idx>=0) v=v.slice(idx+3); else if(v.indexOf("r=")===0) v=v.slice(2);
  let payload; try{ payload=dec(v); }catch(e){ toast("That doesn't look like a reply link"); return false; }
  const plan=DB.plans[payload.p];
  if(!plan){ toast("No matching plan saved on this device"); return false; }
  plan.responses=plan.responses||[];
  const sig=JSON.stringify(payload.v)+"|"+(payload.w||"");
  if(!plan.responses.some(r=> JSON.stringify(r.v)+"|"+(r.w||"")===sig)) plan.responses.push(payload);
  DB.currentId=plan.id; save();
  closeSheet(); openResponsesFor(plan); chord(); return true;
}

/* ============================== cloud sync ============================== */
function saveLocal(){ try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){} }
function apiReady(){ return !!API_BASE && !!(DB.auth && DB.auth.token); }
function cleanPlan(p){ const {responses, ...rest}=p; return rest; } // never store responses inside the plan blob

async function api(path,{method="GET",body,auth=true}={}){
  const headers={};
  if(body) headers["Content-Type"]="application/json";
  if(auth && DB.auth && DB.auth.token) headers["Authorization"]="Bearer "+DB.auth.token;
  const res=await fetch(API_BASE+path,{method,headers,body:body?JSON.stringify(body):undefined});
  if(!res.ok){ const err=new Error("api_"+res.status); err.status=res.status; throw err; }
  const ct=res.headers.get("content-type")||"";
  return ct.includes("json")?res.json():res.text();
}

let _dirty=new Set(), _flushT=null;
function syncAfterSave(){
  if(apiReady() && DB.currentId && DB.plans[DB.currentId]){
    _dirty.add(DB.currentId);
    clearTimeout(_flushT); _flushT=setTimeout(flushDirty,1200);
  }
}
async function flushDirty(){
  if(!apiReady()) return;
  const ids=[..._dirty]; _dirty.clear();
  for(const id of ids){ const p=DB.plans[id]; if(!p) continue;
    try{ await api("/plans/"+id,{method:"PUT",body:cleanPlan(p)}); }
    catch(e){ if(e.status===401){ signedOut(); return; } _dirty.add(id); }
  }
}
async function pushPlanNow(id){
  const p=DB.plans[id]; if(!apiReady()||!p) return false;
  try{ await api("/plans/"+id,{method:"PUT",body:cleanPlan(p)}); return true; }catch(e){ return false; }
}
async function deleteRemote(id){ if(!apiReady())return; try{ await api("/plans/"+id,{method:"DELETE"}); }catch(e){} }

async function cloudLogin(code){
  const r=await api("/auth/code",{method:"POST",body:{code},auth:false});
  DB.auth={token:r.token}; saveLocal();
  await cloudPull();
}
function signedOut(){ DB.auth={}; saveLocal(); updateSyncBadge(); }
function cloudLogout(){ signedOut(); toast("Signed out — plans stay on this device"); }

async function cloudPull(){
  if(!apiReady()) return;
  let data; try{ data=await api("/plans"); }catch(e){ if(e.status===401) signedOut(); return; }
  (data.plans||[]).forEach(p=>{
    if(!p||!p.id) return;
    const local=DB.plans[p.id];
    if(!p.responses) p.responses=(local&&local.responses)||[];
    if(!local || (p.updated||0)>=(local.updated||0)) DB.plans[p.id]=p;
  });
  if(!DB.currentId){ const ids=Object.keys(DB.plans); if(ids.length) DB.currentId=ids[ids.length-1]; }
  saveLocal();
}

async function refreshReplies(id){
  if(!apiReady()||!id) return false;
  let data; try{ data=await api("/plans/"+id+"/responses"); }catch(e){ return false; }
  const p=DB.plans[id]; if(!p) return false;
  const before=(p.responses||[]).length;
  p.responses=data.responses||[]; saveLocal();
  return p.responses.length!==before;
}
async function fetchGuestPlan(id){
  const r=await api("/plan/"+id,{auth:false});
  return r.plan;
}

function genCode(){ const w="abcdefghjkmnpqrstuvwxyz23456789"; let s=""; for(let i=0;i<20;i++){ s+=w[Math.floor(Math.random()*w.length)]; if(i%5===4&&i<19)s+="-"; } return s; }
function updateSyncBadge(){
  const b=$("#btnCloud"); if(!b) return;
  if(!API_BASE){ b.style.display="none"; return; }
  b.style.display="";
  b.classList.toggle("on",apiReady());
  b.title=apiReady()?"Synced — tap for options":"Sign in to sync";
}
function openSyncSheet(){
  openSheet(inEl=>{
    inEl.appendChild(h("h2",{},"Sync across devices"));
    if(!API_BASE){
      inEl.appendChild(h("div",{class:"hint",style:"margin-top:6px"},
        "No server set yet. Paste your Worker URL into the API_BASE line near the top of this file to turn on sync."));
      return;
    }
    if(apiReady()){
      inEl.appendChild(h("div",{class:"hint",style:"font-size:14px;color:var(--ink-soft);margin-top:6px"},
        "Signed in. Your plans sync automatically. Enter the same login code on another device to see them there, and shared “live links” collect replies for you."));
      inEl.appendChild(h("div",{class:"sheet-btns",style:"margin-top:18px"},[
        h("button",{class:"btn btn-ghost",style:"width:auto;flex:1",onclick:async()=>{ closeSheet(); toast("Syncing…"); await cloudPull(); render(); toast("Synced ✓"); }},"Pull latest"),
        h("button",{class:"btn btn-primary",onclick:()=>{ cloudLogout(); closeSheet(); render(); }},"Sign out")
      ]));
      return;
    }
    inEl.appendChild(h("div",{class:"hint",style:"font-size:13.5px;color:var(--ink-soft);margin-top:4px"},
      "Enter a login code, and use the SAME code on every device to sync your plans between them. Make it long and unique — anyone who has it can see your plans."));
    const field=h("div",{class:"field"},[ h("label",{},"Login code") ]);
    const inp=h("input",{type:"text",placeholder:"at least 8 characters",autocapitalize:"off",autocorrect:"off",spellcheck:"false"});
    field.appendChild(inp);
    field.appendChild(h("button",{class:"smallbtn",style:"padding:6px 0;margin-top:6px",onclick:()=>{ inp.value=genCode(); }},"✨ Generate a strong code"));
    inEl.appendChild(field);
    inEl.appendChild(h("div",{class:"sheet-btns"},[
      h("button",{class:"btn btn-primary",onclick:async()=>{
        const code=inp.value.trim(); if(code.length<8){ toast("At least 8 characters"); return; }
        toast("Signing in…");
        try{ await cloudLogin(code); }catch(e){ toast("Sign-in failed — check your code/URL"); return; }
        closeSheet(); updateSyncBadge(); render(); toast("Synced ✓");
      }},"Sign in & sync")
    ]));
    setTimeout(()=>inp.focus(),250);
  });
}

/* ============================== boot ============================== */
function render(){
  const r=readHash();
  if(window.__PENCILED_EMBED__ && r.mode==="edit"){
    document.body.classList.add("guest"); renderRespond(window.__PENCILED_EMBED__); syncSoundBtn(); return;
  }
  if(r.mode==="cloudview"){ document.body.classList.add("guest"); renderCloudView(r.data); syncSoundBtn(); updateSyncBadge(); return; }
  if(r.mode==="respond"){ document.body.classList.add("guest"); renderRespond(r.data); }
  else if(r.mode==="results"){ renderResults(r.data); }
  else {
    renderEdit();
    if(apiReady() && DB.currentId) refreshReplies(DB.currentId).then(changed=>{ if(changed && readHash().mode==="edit") renderEdit(); });
  }
  syncSoundBtn(); updateSyncBadge();
}
function syncSoundBtn(){ const b=$("#btnSound"); b.classList.toggle("on",!!DB.prefs.sound); b.textContent=DB.prefs.sound?"♪":"♪̶"; b.title=DB.prefs.sound?"Sound on":"Sound off"; }

$("#btnSound").addEventListener("click",()=>{ DB.prefs.sound=!DB.prefs.sound; save(); syncSoundBtn(); if(DB.prefs.sound) blip(660,0.08,"triangle",0.14); });
$("#btnPlans").addEventListener("click",openPlansSheet);
$("#btnCloud").addEventListener("click",openSyncSheet);
window.addEventListener("hashchange",render);

(async function init(){
  if(apiReady()){ try{ await cloudPull(); }catch(e){} }
  try{ render(); }catch(e){ try{ document.body.classList.remove("guest"); renderEdit(); updateSyncBadge(); }catch(_){} }
})();
</script>
